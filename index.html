<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Test — Google Play Closed Testing Exchange</title>
<style>
:root{
  --bg:#0F1117; --card:#1A1D27; --card2:#222636; --border:#2A2F42;
  --text:#E5E9F0; --muted:#8B93A7; --accent:#22C55E; --accent-dim:#16803C;
  --danger:#EF4444; --warn:#F59E0B; --info:#3B82F6; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Inter,system-ui,sans-serif;font-size:15px;min-height:100vh}
a{color:var(--accent)}
#layout{display:flex;min-height:100vh}
/* SIDEBAR */
#sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);padding:20px 12px;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;gap:4px;z-index:10}
#sidebar .logo{font-size:18px;font-weight:700;padding:6px 12px 18px;display:flex;align-items:center;gap:8px}
#sidebar .logo span{color:var(--accent)}
.navbtn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--muted);cursor:pointer;border:none;background:none;font-size:14.5px;width:100%;text-align:left;transition:background .15s ease-out,color .15s ease-out}
.navbtn:hover{background:var(--card2);color:var(--text)}
.navbtn.active{background:rgba(34,197,94,.12);color:var(--accent);font-weight:600}
#sidebar .bottom{margin-top:auto;font-size:12px;color:var(--muted);padding:12px}
.langsw{display:flex;gap:6px;padding:8px 12px}
.langsw button{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
.langsw button.on{color:var(--accent);border-color:var(--accent);font-weight:700}
/* MAIN */
#main{margin-left:240px;flex:1;padding:28px 32px;max-width:1200px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h2{font-size:17px;font-weight:600;margin:22px 0 12px}
.sub{color:var(--muted);margin-bottom:22px;font-size:14px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:16px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:900px){.grid.c2,.grid.c3{grid-template-columns:1fr}#main{padding:20px 14px}}
/* MOBILE (Android phones): bottom navigation bar + touch-friendly targets */
@media(max-width:768px){
  #sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:auto;flex-direction:row;padding:6px 4px calc(6px + env(safe-area-inset-bottom));border-right:none;border-top:1px solid var(--border);justify-content:space-around;align-items:stretch;gap:0}
  #sidebar .logo,#sidebar .bottom,#sidebar .langsw{display:none}
  .navbtn{flex-direction:column;gap:2px;padding:7px 2px;width:auto;flex:1;align-items:center;text-align:center;min-height:52px;justify-content:center}
  .navbtn>span:first-child{font-size:19px}
  .navbtn .lbl{font-size:9.5px;line-height:1.1}
  #main{margin-left:0;margin-bottom:84px;padding:16px 12px}
  input,textarea,select{font-size:16px;min-height:44px}
  textarea{min-height:70px}
  .btn{min-height:44px}
  #modalBox{max-width:100%;padding:20px 16px}
  h1{font-size:19px}
  .stat{font-size:24px}
}
/* ELEMENTS */
.btn{background:var(--accent);color:#06210f;border:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.12)}
.btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--danger);color:#fff}
.btn.small{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input,textarea,select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;width:100%;font-family:inherit}
input:focus,textarea:focus{outline:1px solid var(--accent)}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge.green{background:rgba(34,197,94,.15);color:var(--accent)}
.badge.blue{background:rgba(59,130,246,.15);color:var(--info)}
.badge.amber{background:rgba(245,158,11,.15);color:var(--warn)}
.badge.red{background:rgba(239,68,68,.15);color:var(--danger)}
.badge.gray{background:var(--card2);color:var(--muted)}
.progress{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin:6px 0}
.progress>div{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease-out}
.stat{font-size:30px;font-weight:700}
.stat small{font-size:14px;color:var(--muted);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:10px;border:1px solid}
.alert.red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#FCA5A5}
.alert.amber{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#FCD34D}
.alert.green{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:#86EFAC}
.muted{color:var(--muted);font-size:13px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
/* MODAL */
#modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
#modalWrap.open{display:flex}
#modalBox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow:auto;animation:fadeIn .18s ease-out}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:13px 20px;border-radius:12px;font-size:14px;display:none;z-index:60;max-width:340px}
/* BANNER 100 */
.founderBanner{background:linear-gradient(90deg,rgba(34,197,94,.18),rgba(59,130,246,.12));border:1px solid rgba(34,197,94,.4);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;font-size:15px}
.founderBanner b{color:var(--accent);font-size:18px}
/* REGISTER */
#registerView{max-width:520px;margin:40px auto;padding:0 16px}
.ring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;margin:0 auto}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;margin-top:10px}
.bar-chart>div{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;position:relative}
.bar-chart>div span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
.appicon{width:44px;height:44px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
</style>
</head>

let S=loadState();
let LANG=S.lang||'en';
function t(k,vars){let s=(T[LANG][k]!==undefined?T[LANG][k]:T.en[k])||k;if(vars)Object.entries(vars).forEach(([kk,v])=>{s=s.split('{'+kk+'}').join(v);});return s;}
function setLang(l){LANG=l;S.lang=l;save();document.documentElement.lang=l;render();}

function defaultState(){return{version:1,me:null,adminPin:null,lang:'en',users:[],apps:[],matches:[]};}
function loadState(){try{const raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):defaultState();}catch(e){return defaultState();}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(S));}
function uid(){return Math.random().toString(36).slice(2,10);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function me(){return S.users.find(u=>u.id===S.me);}
function isMaster(){const m=me();return !!m&&m.email===MASTER_ADMIN_EMAIL;}
function userById(id){return S.users.find(u=>u.id===id);}
function appById(id){return S.apps.find(a=>a.id===id);}

/* ---------- 14-DAY CONTINUITY LOGIC (the heart of the app) ---------- */
/* Returns the current UNBROKEN check-in streak ending today or yesterday.
   A gap of more than 1 day = streak reset (exactly how Google counts it). */
function streak(m){
  if(!m.checkins.length) return 0;
  const dates=[...new Set(m.checkins.map(c=>c.date))].sort();
  let run=1;
  for(let i=dates.length-1;i>0;i--){
    if(daysDiff(dates[i-1],dates[i])===1) run++; else break;
  }
  const last=dates[dates.length-1];
  const gap=daysDiff(last,todayISO());
  if(gap>1) return 0;            // gap — streak reset
  return run;
}
function lastCheckin(m){return m.checkins.length?[...m.checkins.map(c=>c.date)].sort().pop():null;}
function checkedToday(m){return m.checkins.some(c=>c.date===todayISO());}
function dayNumber(m){return streak(m);}

/* ---------- TRUST SCORE ---------- */
function trust(u){
  const asTester=S.matches.filter(m=>m.testerId===u.id);
  let tt=50;
  tt+=asTester.filter(m=>m.status==='done').length*12;
  tt-=asTester.filter(m=>m.status==='abandoned').length*15;
  asTester.filter(m=>m.status==='active').forEach(m=>{tt+=Math.min(streak(m),14);});
  const withFeedback=asTester.filter(m=>m.surveys&&(m.surveys.d7||m.surveys.d14)).length;
  tt+=withFeedback*4;
  return Math.max(0,Math.min(100,Math.round(tt)));
}
function points(u){
  let p=0;
  S.matches.filter(m=>m.testerId===u.id).forEach(m=>{p+=m.checkins.length*10;if(m.status==='done')p+=50;});
  return p;
}

let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',3500);}
function modal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalWrap').classList.add('open');}
function closeModal(){document.getElementById('modalWrap').classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.id==='modalWrap')closeModal();});

/* ---------- GOOGLE SIGN-IN (Google Identity Services) ---------- */
function googleClientId(){return (S.googleClientId||DEFAULT_GOOGLE_CLIENT_ID||'').trim();}
function parseJwt(tok){
  const b=tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(Array.prototype.map.call(atob(b),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}
let gisReady=false,gisClientUsed='';
function maybeInitGoogle(){
  const cid=googleClientId();
  if(!cid||!window.google||!google.accounts) return;
  if(!gisReady||gisClientUsed!==cid){ // initialize once per Client ID (re-init only when the ID changes)
    google.accounts.id.initialize({client_id:cid,callback:onGoogleCredential});
    gisReady=true;gisClientUsed=cid;
  }
  const el=document.getElementById('gBtn');
  if(el){el.innerHTML='';google.accounts.id.renderButton(el,{theme:'filled_black',size:'large',text:'continue_with',locale:LANG==='pl'?'pl':'en',width:300});}
}
function onGoogleCredential(resp){
  let p;
  try{p=parseJwt(resp.credential);}catch(e){toast(t('gReadErr'));return;}
  const email=(p.email||'').toLowerCase();
  if(!email||!p.email_verified){toast(t('gNoMail'));return;}
  const existing=S.users.find(u=>u.email===email);
  if(existing){ // returning user — sign in
    S.me=existing.id;existing.google=true;if(p.picture)existing.picture=p.picture;save();
    toast(t('welcomeBack',{n:existing.nick}));render();return;
  }
  // new account — finish sign-up (nickname + declarations)
  const suggested=(p.given_name||p.name||email.split('@')[0]).replace(/\s+/g,'').slice(0,24);
  modal(`<h2 style="margin-top:0">${t('finishTitle')}</h2>
  <div class="row" style="margin:10px 0">${p.picture?`<img src="${esc(p.picture)}" style="width:44px;height:44px;border-radius:50%">`:''}<div><b>${esc(p.name||'')}</b><div class="muted">${esc(email)}</div></div></div>
  <label>${t('nick')}</label><input id="gNick" maxlength="24" value="${esc(suggested)}">
  <label style="display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-weight:400;color:var(--text)"><input type="checkbox" id="gDevice" style="width:auto;margin-top:3px"> <span>${t('declDevice')}</span></label>
  <label style="display:flex;align-items:flex-start;gap:8px;margin-top:10px;font-weight:400;color:var(--text)"><input type="checkbox" id="gTerms" style="width:auto;margin-top:3px"> <span>${t('declTerms')}</span></label>
  <button class="btn" style="width:100%;margin-top:18px" onclick="finishGoogleReg('${esc(email)}','${esc(p.picture||'')}')">${t('createAcc')}</button>`);
}
function finishGoogleReg(email,picture){
  const nick=document.getElementById('gNick').value.trim();
  if(nick.length<3){toast(t('vNick'));return;}
  if(!document.getElementById('gDevice').checked||!document.getElementById('gTerms').checked){toast(t('vBoth'));return;}
  const founder=S.users.length<FREE_LIMIT;
  const u={id:uid(),nick,email,founder,createdAt:todayISO(),demo:false,google:true,picture:picture||null};
  S.users.push(u);S.me=u.id;save();closeModal();
  toast(founder?t('welcomeFounder'):t('created'));
  render();
}

function doRegister(){
  const nick=document.getElementById('regNick').value.trim();
  const email=document.getElementById('regEmail').value.trim().toLowerCase();
  if(nick.length<3){toast(t('vNick'));return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast(t('vEmail'));return;}
  const existing=S.users.find(u=>u.email===email);
  if(existing){S.me=existing.id;save();toast(t('welcomeBack',{n:existing.nick}));render();return;}
  if(!document.getElementById('regDevice').checked||!document.getElementById('regTerms').checked){toast(t('vBoth'));return;}
  const founder=S.users.length<FREE_LIMIT;
  const u={id:uid(),nick,email,founder,createdAt:todayISO(),demo:false};
  S.users.push(u);S.me=u.id;save();
  toast(founder?t('welcomeFounder'):t('created'));
  render();
}

function dashboardView(){
  const my=me();
  const myApps=S.apps.filter(a=>a.ownerId===my.id);
  const myTesting=S.matches.filter(m=>m.testerId===my.id&&m.status==='active');
  const todo=myTesting.filter(m=>m.started&&!checkedToday(m));
  const count=S.users.length,left=Math.max(0,FREE_LIMIT-count);

  let alerts='';
  myApps.forEach(a=>{
    S.matches.filter(m=>m.appId===a.id&&m.status==='active'&&m.started).forEach(m=>{
      const last=lastCheckin(m),gap=last?daysDiff(last,todayISO()):99;
      const tu=userById(m.testerId);
      if(gap>=2) alerts+=`<div class="alert red">${t('alertReset',{t:esc(tu?tu.nick:'?'),a:esc(a.title),n:gap})}</div>`;
      else if(gap===1&&!checkedToday(m)) alerts+=`<div class="alert amber">${t('alertToday',{t:esc(tu?tu.nick:'?'),a:esc(a.title)})}</div>`;
    });

  return `<h1>${t('dashTitle')}</h1><div class="sub">${t('hello',{n:esc(my.nick)})} ${isMaster()?'<span class="badge blue">👑 Master Admin</span> ':''}${my.founder?'<span class="badge green">'+t('founderBadge')+'</span>':''}</div>

  </div>

  ${todo.length?todo.map(m=>{const a=appById(m.appId);return `
    <div class="card spread"><div class="row"><div class="appicon">🎮</div><div><b>${esc(a.title)}</b><div class="muted">${t('dayOf',{d:dayNumber(m)+1,max:REQUIRED_DAYS})} · ${t('by')} ${esc(userById(a.ownerId)?.nick||'?')}</div></div></div>
    <button class="btn" onclick="openCheckin('${m.id}')">${t('checkinBtn')}</button></div>`;}).join('')
  :'<div class="card muted">'+t('todayEmpty')+'</div>'}
  <h2>${t('progressTitle')}</h2>

}
function appProgressCard(a){
  const ms=S.matches.filter(m=>m.appId===a.id&&m.status==='active'&&m.started);
  const qualified=ms.filter(m=>streak(m)>=REQUIRED_DAYS).length;
  const activeCount=ms.length;
  return `<div class="card">
    <div class="spread"><div class="row"><div class="appicon">🎮</div><div><b>${esc(a.title)}</b> <span class="badge ${a.status==='searching'?'blue':'green'}">${a.status==='searching'?t('searching'):t('inTest')}</span></div></div>
    <div><span class="stat">${activeCount}<small>${t('testers',{n:TARGET_TESTERS})}</small></span></div></div>
    <div class="progress"><div style="width:${Math.min(100,activeCount/TARGET_TESTERS*100)}%"></div></div>
    <div class="muted">${t('recommend',{n:TARGET_TESTERS,min:GOOGLE_MIN_TESTERS})}<b style="color:var(--accent)">${qualified}</b></div>
    ${ms.map(m=>{const tu=userById(m.testerId);const s=streak(m);const gap=lastCheckin(m)?daysDiff(lastCheckin(m),todayISO()):0;
      return `<div style="margin-top:10px"><div class="spread"><span>${esc(tu?tu.nick:'?')} <span class="muted">(${t('trust')} ${trust(tu)})</span></span><span class="${s>=REQUIRED_DAYS?'badge green':gap>=2?'badge red':'badge gray'}">${s>=REQUIRED_DAYS?t('full14'):gap>=2?t('streakZero'):t('dayXof',{d:s,max:REQUIRED_DAYS})}</span></div>
      <div class="progress"><div style="width:${Math.min(100,s/REQUIRED_DAYS*100)}%;${gap>=2?'background:var(--danger)':''}"></div></div></div>`;}).join('')}  </div>`;
}

/* ============ MY GAMES ============ */
function myAppsView(){
  const my=me();const myApps=S.apps.filter(a=>a.ownerId===my.id);
  return `<h1>${t('myappsTitle')}</h1><div class="sub">${t('myappsSub')}</div>
  <button class="btn" onclick="openAddApp()">${t('addGame')}</button>
  <div style="height:18px"></div>
  ${myApps.length?myApps.map(a=>`
    <div class="card spread">
      <div class="row"><div class="appicon">🎮</div><div><b>${esc(a.title)}</b> <span class="badge ${a.status==='draft'?'gray':a.status==='searching'?'blue':'green'}">${{draft:t('draft'),searching:t('searching'),testing:t('inTest')}[a.status]}</span>
      <div class="muted">${esc(a.desc||'')}</div>

        ${a.status==='draft'?`<button class="btn small" onclick="publishApp('${a.id}')">${t('publish')}</button>`:''}

}
function openAddApp(){
  modal(`<h2 style="margin-top:0">${t('addTitle')}</h2>
  <label>${t('gameTitle')}</label><input id="apTitle" maxlength="60" placeholder="${t('gameTitlePh')}">
  <label>${t('gameDesc')}</label><textarea id="apDesc" rows="3" maxlength="300" placeholder="${t('gameDescPh')}"></textarea>
  <label>${t('optinLink')}</label><input id="apLink" placeholder="https://play.google.com/apps/testing/com.your.game">
  <div class="muted" style="margin-top:8px">${t('optinHint')}</div>
  <div class="row" style="margin-top:20px"><button class="btn" onclick="addApp()">${t('save')}</button><button class="btn sec" onclick="closeModal()">${t('cancel')}</button></div>`);
}
function addApp(){
  const title=document.getElementById('apTitle').value.trim();
  const desc=document.getElementById('apDesc').value.trim();
  const link=document.getElementById('apLink').value.trim();
  if(title.length<2){toast(t('vTitle'));return;}
  if(!/^https:\/\/play\.google\.com\/apps\/testing\/[\w.]+/.test(link)){toast(t('vLink'));return;}
  S.apps.push({id:uid(),ownerId:S.me,title,desc,link,status:'draft',createdAt:todayISO()});
  save();closeModal();toast(t('savedDraft'));render();
}
function publishApp(id){const a=appById(id);a.status='searching';save();toast(t('published'));render();}
function deleteApp(id){
  if(S.matches.some(m=>m.appId===id&&m.status==='active')){toast(t('cantDelete'));return;}
  S.apps=S.apps.filter(a=>a.id!==id);S.matches=S.matches.filter(m=>m.appId!==id);save();render();
}

/* ============ TEST EXCHANGE ============ */
function exchangeView(){
  const my=me();
  const avail=S.apps.filter(a=>a.ownerId!==my.id&&(a.status==='searching'||a.status==='testing')&&!S.matches.some(m=>m.appId===a.id&&m.testerId===my.id));
  return `<h1>${t('exTitle')}</h1><div class="sub">${t('exSub')}</div>
  ${avail.length?avail.map(a=>{const o=userById(a.ownerId);const cnt=S.matches.filter(m=>m.appId===a.id&&m.status==='active').length;
    return `<div class="card spread">
      <div class="row"><div class="appicon">🎮</div><div><b>${esc(a.title)}</b>
      <div class="muted">${esc(a.desc||'')}</div>
      <div class="muted">${t('author')} <b>${esc(o?o.nick:'?')}</b> · ${t('trust')} <span class="badge ${trust(o)>=70?'green':'amber'}">${trust(o)}</span> · ${cnt}/${TARGET_TESTERS}</div></div></div>
      <button class="btn" onclick="acceptChallenge('${a.id}')">${t('accept')}</button>
    </div>`;}).join(''):'<div class="card muted">'+t('exEmpty')+'</div>'}`;
}
function acceptChallenge(appId){
  const a=appById(appId);
  S.matches.push({id:uid(),appId,testerId:S.me,accepted:todayISO(),started:null,checkins:[],surveys:{d7:null,d14:null},screenshot:null,status:'active'});
  if(a.status==='searching')a.status='testing';
  save();
  modal(`<h2 style="margin-top:0">${t('acceptedTitle')}</h2>

  <div class="alert amber">${t('warn14')}</div>
  <button class="btn" onclick="closeModal();nav('mytests')">${t('goMyTests')}</button>`);
  render();
}

/* ============ MY TESTS ============ */
function myTestsView(){
  const ms=S.matches.filter(m=>m.testerId===S.me);
  return `<h1>${t('mtTitle')}</h1><div class="sub">${t('mtSub')}</div>
  ${ms.length?ms.map(m=>{const a=appById(m.appId);if(!a)return '';const s=streak(m);const done=m.status==='done';
    return `<div class="card">
    <div class="spread"><div class="row"><div class="appicon">🎮</div><div><b>${esc(a.title)}</b> <span class="badge ${done?'green':m.status==='abandoned'?'red':'blue'}">${done?t('stDone'):m.status==='abandoned'?t('stAbandoned'):m.started?t('dayOf',{d:s,max:REQUIRED_DAYS}):t('stWaiting')}</span>
    <div class="muted">${t('author')} ${esc(userById(a.ownerId)?.nick||'?')}</div></div></div>
    <div class="row">
    ${!m.started&&m.status==='active'?`<button class="btn" onclick="startTest('${m.id}')">${t('startBtn')}</button>`:''}
    ${m.started&&m.status==='active'&&!checkedToday(m)?`<button class="btn" onclick="openCheckin('${m.id}')">${t('checkinBtn')}</button>`:''}
    ${m.started&&m.status==='active'&&checkedToday(m)?`<span class="badge green">${t('doneToday')}</span>`:''}
    </div></div>
    ${m.started?`<div class="progress"><div style="width:${Math.min(100,s/REQUIRED_DAYS*100)}%"></div></div>
    <div class="muted">${t('optinLinkLbl')}: <span style="word-break:break-all">${esc(a.link)}</span></div>
    ${s>=7&&!m.surveys.d7&&m.status==='active'?`<div class="alert amber" style="margin-top:10px">${t('d7due',{id:m.id})}</div>`:''}
    ${s>=REQUIRED_DAYS&&!m.surveys.d14&&m.status==='active'?`<div class="alert green" style="margin-top:10px">${t('d14due',{id:m.id})}</div>`:''}
    `:''}
    </div>`;}).join(''):'<div class="card muted">'+t('mtEmpty')+'</div>'}`;
}
function startTest(id){
  modal(`<h2 style="margin-top:0">${t('startTitle')}</h2>
  <p style="margin:10px 0;font-size:14px">${t('startInfo')}</p>
  <label>${t('shotLabel')}</label><input type="file" id="shot" accept="image/*">
  <label>${t('firstNote')}</label><textarea id="note0" rows="2" placeholder="${t('firstNotePh')}"></textarea>
  <div class="row" style="margin-top:18px"><button class="btn" onclick="confirmStart('${id}')">${t('startTimer')}</button><button class="btn sec" onclick="closeModal()">${t('cancel')}</button></div>`);
}
function confirmStart(id){
  const m=S.matches.find(x=>x.id===id);
  const f=document.getElementById('shot').files[0];
  const note=document.getElementById('note0').value.trim();
  if(!f){toast(t('vShot'));return;}
  if(note.length<10){toast(t('vNote'));return;}
  const r=new FileReader();
  r.onload=()=>{
    m.screenshot={name:f.name,taken:todayISO(),data:String(r.result).slice(0,200000)};
    m.started=todayISO();
    m.checkins.push({date:todayISO(),note});
    save();closeModal();toast(t('started'));render();
  };
  r.readAsDataURL(f);
}
function openCheckin(id){
  const m=S.matches.find(x=>x.id===id);const a=appById(m.appId);
  modal(`<h2 style="margin-top:0">${t('ciTitle',{a:esc(a.title)})}</h2>
  <p class="muted" style="margin:8px 0">${t('ciInfo',{d:streak(m)+1,max:REQUIRED_DAYS})}</p>
  <textarea id="ciNote" rows="3" placeholder="${t('ciPh')}"></textarea>
  <div class="row" style="margin-top:18px"><button class="btn" onclick="doCheckin('${id}')">${t('ciBtn')}</button><button class="btn sec" onclick="closeModal()">${t('cancel')}</button></div>`);
}
function doCheckin(id){
  const m=S.matches.find(x=>x.id===id);
  if(checkedToday(m)){toast(t('ciDup'));closeModal();return;}
  const note=document.getElementById('ciNote').value.trim();
  if(note.length<10){toast(t('ciShort'));return;}
  m.checkins.push({date:todayISO(),note});save();closeModal();
  const s=streak(m);
  toast(s>=REQUIRED_DAYS?t('ci14'):t('ciOk',{d:s,max:REQUIRED_DAYS}));
  render();
}
function openSurvey(id,which){
  const m=S.matches.find(x=>x.id===id);const a=appById(m.appId);
  modal(`<h2 style="margin-top:0">${t(which==='d7'?'svTitleD7':'svTitleD14',{a:esc(a.title)})}</h2>
  <p class="muted" style="margin:8px 0">${t('svInfo')}</p>
  <label>${t('q1')}</label><textarea id="q1" rows="2"></textarea>
  <label>${t('q2')}</label><textarea id="q2" rows="2"></textarea>
  <label>${t('q3')}</label><textarea id="q3" rows="2"></textarea>
  <div class="row" style="margin-top:18px"><button class="btn" onclick="submitSurvey('${id}','${which}')">${t('svSend')}</button><button class="btn sec" onclick="closeModal()">${t('svLater')}</button></div>`);
}
function submitSurvey(id,which){
  const m=S.matches.find(x=>x.id===id);
  const q1=document.getElementById('q1').value.trim(),q2=document.getElementById('q2').value.trim(),q3=document.getElementById('q3').value.trim();
  if((q1+q2+q3).length<30){toast(t('svShort'));return;}
  m.surveys[which]={q1,q2,q3,date:todayISO()};
  if(which==='d14'&&streak(m)>=REQUIRED_DAYS){m.status='done';toast(t('svDone'));}
  else toast(t('svSaved'));
  save();closeModal();render();
}

/* ============ REPUTATION ============ */
function reputationView(){
  const my=me();const tv=trust(my);const p=points(my);
  const done=S.matches.filter(m=>m.testerId===my.id&&m.status==='done').length;
  const color=tv>=70?'var(--accent)':tv>=40?'var(--warn)':'var(--danger)';
  return `<h1>${t('repTitle')}</h1><div class="sub">${t('repSub')}</div>
  <div class="grid c2">
    <div class="card" style="text-align:center">
      <div class="ring" style="background:conic-gradient(${color} ${tv*3.6}deg, var(--card2) 0deg)"><div style="width:92px;height:92px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center">${tv}</div></div>
      <div style="margin-top:12px;font-weight:600">${t('trustScore')}</div>
      <div class="muted">${tv>=70?t('trustHigh'):tv>=40?t('trustMid'):t('trustLow')}</div>
    </div>
    <div class="card">
      <div class="spread"><span class="muted">${t('repPoints')}</span><b style="color:var(--accent)">${p}</b></div><hr style="border-color:var(--border);margin:10px 0">
      <div class="spread"><span class="muted">${t('repCycles')}</span><b>${done}</b></div><hr style="border-color:var(--border);margin:10px 0">
      <div class="spread"><span class="muted">${t('repActive')}</span><b>${S.matches.filter(m=>m.testerId===my.id&&m.status==='active').length}</b></div><hr style="border-color:var(--border);margin:10px 0">
      <div class="spread"><span class="muted">${t('repBadges')}</span><span>${my.founder?'<span class="badge green">'+t('founderBadge')+'</span> ':''}${done>=1?'<span class="badge blue">'+t('bFinisher')+'</span> ':''}${done>=3?'<span class="badge green">'+t('bPro')+'</span>':''}</span></div>
    </div>
  </div>
  <div class="card"><b>${t('howTrust')}</b><ul style="margin:10px 0 0 20px;line-height:1.9;font-size:14px;color:var(--muted)">${t('howTrustList')}</ul></div>`;
}

/* ============ ADMIN ============ */
let adminUnlocked=false;
function adminView(){
  if(!isMaster()&&view==='admin'){view='dashboard';return dashboardView();} // admin is master-only
  if(isMaster())adminUnlocked=true; // the owner's account needs no PIN
  if(!S.adminPin&&!isMaster()){
    return `<h1>${t('admTitle')}</h1><div class="sub">${t('admFirst')}</div>
    <div class="card" style="max-width:420px"><label>${t('newPin')}</label><input id="pinNew" type="password" maxlength="8" inputmode="numeric">
    <button class="btn" style="margin-top:16px" onclick="setPin()">${t('setPin')}</button></div>`;
  }
  if(!adminUnlocked){
    return `<h1>${t('admTitle')}</h1><div class="sub">${t('admOnly')}</div>
    <div class="card" style="max-width:420px"><label>${t('pin')}</label><input id="pinIn" type="password" maxlength="8" inputmode="numeric" onkeydown="if(event.key==='Enter')unlockAdmin()">
    <button class="btn" style="margin-top:16px" onclick="unlockAdmin()">${t('unlock')}</button></div>`;
  }
  const count=S.users.length,left=Math.max(0,FREE_LIMIT-count);
  const byDay={};S.users.forEach(u=>{byDay[u.createdAt]=(byDay[u.createdAt]||0)+1;});
  const days=Object.keys(byDay).sort().slice(-14);
  const maxV=Math.max(1,...days.map(d=>byDay[d]));
  return `<h1>${t('admTitle')}</h1><div class="sub">${t('admSub')}</div>
  <div class="grid c3">
    <div class="card"><div class="muted">${t('admTotal')}</div><div class="stat" style="color:var(--accent)">${count}</div></div>
    <div class="card"><div class="muted">${t('admFree')}</div><div class="stat">${left}<small> / ${FREE_LIMIT}</small></div></div>
    <div class="card"><div class="muted">${t('admSubs')}</div><div class="stat">${Math.max(0,count-FREE_LIMIT)}</div></div>
  </div>
  <div class="card"><b>${t('admChart')}</b>
    <div class="bar-chart">${days.map(d=>`<div style="height:${byDay[d]/maxV*100}%" title="${d}: ${byDay[d]}"><span>${d.slice(5)}</span></div>`).join('')||'<div class="muted">—</div>'}</div>
    <div style="height:20px"></div></div>
  <div class="card"><b>${t('admList',{n:count})}</b>
    <table style="margin-top:10px"><tr><th>${t('colNo')}</th><th>${t('colNick')}</th><th>${t('colEmail')}</th><th>${t('colDate')}</th><th>${t('colStatus')}</th><th>${t('colTrust')}</th></tr>
    ${S.users.map((u,i)=>`<tr><td>${i+1}</td><td>${esc(u.nick)}${u.demo?' <span class="badge gray">demo</span>':''}</td><td>${esc(u.email)}</td><td>${u.createdAt}</td><td>${u.founder?'<span class="badge green">'+t('stFounder')+'</span>':'<span class="badge amber">'+t('stPaid')+'</span>'}</td><td>${trust(u)}</td></tr>`).join('')}
    </table></div>
  <div class="alert amber">${t('admPay')}</div>`;
}
function setPin(){const p=document.getElementById('pinNew').value.trim();if(!/^\d{4,8}$/.test(p)){toast(t('vPin'));return;}S.adminPin=p;save();adminUnlocked=true;toast(t('pinSet'));render();}
function unlockAdmin(){if(document.getElementById('pinIn').value===S.adminPin){adminUnlocked=true;render();}else toast(t('pinBad'));}

/* ============ SETTINGS ============ */
function settingsView(){
  return `<h1>${t('setTitle')}</h1><div class="sub">${t('setSub')}</div>
  <div class="card"><b>${t('langTitle')}</b><div style="height:8px"></div>${langSwitcher()}</div>
  <div class="card"><b>${t('dbTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('dbInfo')}</p>
  <div class="row"><button class="btn" onclick="exportJSON()">${t('exportBtn')}</button>
  <label class="btn sec" style="width:auto;margin:0;cursor:pointer">${t('importBtn')}<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label></div></div>
  <div class="card"><b>${t('gTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('gInfo')}</p>
  <label>OAuth Client ID</label><input id="gcid" placeholder="e.g. 1234567890-abc123.apps.googleusercontent.com" value="${esc(S.googleClientId||'')}">
  <button class="btn" style="margin-top:14px" onclick="saveClientId()">${t('gSaveBtn')}</button></div>
  <div class="card"><b>${t('demoTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('demoInfo')}</p>
  <button class="btn sec" onclick="seedDemo()">${t('demoBtn')}</button></div>
  <div class="card"><b>${t('dangerTitle')}</b><div style="height:10px"></div>
  <div class="row"><button class="btn danger" onclick="if(confirm(t('resetConfirm'))){localStorage.removeItem(LS_KEY);location.reload();}">${t('resetBtn')}</button>
  <button class="btn sec" onclick="S.me=null;save();render();">${t('logout')}</button></div></div>
  <div class="card muted" style="font-size:13px">${t('footer')}</div>`;
}
function saveClientId(){
  const v=document.getElementById('gcid').value.trim();
  if(v&&!/\.apps\.googleusercontent\.com$/.test(v)){toast(t('gBad'));return;}
  S.googleClientId=v;save();
  toast(v?t('gSaved'):t('gRemoved'));
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='playtest-connect-db-'+todayISO()+'.json';a.click();
  toast(t('exported'));
}
function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.users||!d.apps)throw 0;S=d;LANG=S.lang||'en';save();toast(t('imported'));render();}catch(e){toast(t('importBad'));}};
  r.readAsText(f);
}
function iso(offsetDays){const d=new Date();d.setDate(d.getDate()+offsetDays);return d.toISOString().slice(0,10);}
function seedDemo(){
  const names=[['PixelPaul','paul@demo.dev'],['GameDevGrace','grace@demo.dev'],['IndieIgor','igor@demo.dev'],['RetroRita','rita@demo.dev'],['MobileMark','mark@demo.dev'],['StudioSam','sam@demo.dev'],['CasualKate','kate@demo.dev']];
  const games=[['Neon Runner','Fast 2D platformer — test levels 1–5 and the shop','com.demo.neonrunner'],['Ball Master','Match-3 puzzle — check the tournament mode','com.demo.balls'],['Speedy Courier','Delivery sim — test the city map and missions','com.demo.courier'],['Mage Tower','Fantasy tower defense — balance of waves 10+','com.demo.tower']];
  const newUsers=[];
  names.forEach(([nick,email],i)=>{
    if(S.users.some(u=>u.email===email))return;
    const u={id:uid(),nick,email,founder:S.users.length<FREE_LIMIT,createdAt:iso(-13+i*2),demo:true};
    S.users.push(u);newUsers.push(u);
  });
  games.forEach(([title,desc,pkg],i)=>{
    const owner=newUsers[i%Math.max(1,newUsers.length)];
    if(!owner||S.apps.some(a=>a.link.endsWith(pkg)))return;
    S.apps.push({id:uid(),ownerId:owner.id,title,desc,link:'https://play.google.com/apps/testing/'+pkg,status:'searching',createdAt:iso(-6)});
  });
  // one live demo test between demo accounts so the dashboard has life
  if(newUsers.length>=2&&S.apps.length){
    const app=S.apps.find(a=>a.ownerId===newUsers[0].id);
    if(app&&!S.matches.some(m=>m.appId===app.id)){
      const m={id:uid(),appId:app.id,testerId:newUsers[1].id,accepted:iso(-5),started:iso(-5),checkins:[],surveys:{d7:null,d14:null},screenshot:null,status:'active'};
      for(let d=-5;d<=0;d++)m.checkins.push({date:iso(d),note:'Tested level '+(6+d)+', works fine.'});
      S.matches.push(m);app.status='testing';
    }
  }
  save();toast(t('demoLoaded',{n:newUsers.length}));render();
}

/* founder #1 — the platform owner is always the first registered account */
if(!S.users.some(u=>u.email===MASTER_ADMIN_EMAIL)){
  S.users.unshift({id:'founder-001',nick:'Kawalko34',email:MASTER_ADMIN_EMAIL,founder:true,createdAt:'2026-07-06',demo:false,google:true});
  save();
}

/* start */
document.documentElement.lang=LANG;
render();
</script>
