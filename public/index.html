<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F1117">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Play Test — Google Play Closed Testing Exchange</title>
<style>
:root{
  --bg:#0F1117; --card:#1A1D27; --card2:#222636; --border:#2A2F42;
  --text:#E5E9F0; --muted:#8B93A7; --accent:#22C55E; --accent-dim:#16803C;
  --danger:#EF4444; --warn:#F59E0B; --info:#3B82F6; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Inter,system-ui,sans-serif;font-size:15px;min-height:100vh}
a{color:var(--accent)}
#layout{display:flex;min-height:100vh}
/* SIDEBAR */
#sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);padding:20px 12px;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;gap:4px;z-index:10}
#sidebar .logo{font-size:18px;font-weight:700;padding:6px 12px 18px;display:flex;align-items:center;gap:8px}
#sidebar .logo span{color:var(--accent)}
.navbtn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--muted);cursor:pointer;border:none;background:none;font-size:14.5px;width:100%;text-align:left;transition:background .15s ease-out,color .15s ease-out}
.navbtn:hover{background:var(--card2);color:var(--text)}
.navbtn.active{background:rgba(34,197,94,.12);color:var(--accent);font-weight:600}
#sidebar .bottom{margin-top:auto;font-size:12px;color:var(--muted);padding:12px}
.langsw{display:flex;gap:6px;padding:8px 12px}
.langsw button{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
.langsw button.on{color:var(--accent);border-color:var(--accent);font-weight:700}
/* MAIN */
#main{margin-left:240px;flex:1;padding:28px 32px;max-width:1200px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h2{font-size:17px;font-weight:600;margin:22px 0 12px}
.sub{color:var(--muted);margin-bottom:22px;font-size:14px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:16px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:900px){.grid.c2,.grid.c3{grid-template-columns:1fr}#main{padding:20px 14px}}
/* MOBILE (Android phones): bottom navigation bar + touch-friendly targets */
@media(max-width:768px){
  #sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:auto;flex-direction:row;padding:6px 4px calc(6px + env(safe-area-inset-bottom));border-right:none;border-top:1px solid var(--border);justify-content:space-around;align-items:stretch;gap:0}
  #sidebar .logo,#sidebar .bottom,#sidebar .langsw{display:none}
  .navbtn{flex-direction:column;gap:2px;padding:7px 2px;width:auto;flex:1;align-items:center;text-align:center;min-height:52px;justify-content:center}
  .navbtn>span:first-child{font-size:19px}
  .navbtn .lbl{font-size:9.5px;line-height:1.1}
  #main{margin-left:0;margin-bottom:84px;padding:16px 12px}
  input,textarea,select{font-size:16px;min-height:44px}
  textarea{min-height:70px}
  .btn{min-height:44px}
  #modalBox{max-width:100%;padding:20px 16px}
  h1{font-size:19px}
  .stat{font-size:24px}
}
/* ELEMENTS */
.btn{background:var(--accent);color:#06210f;border:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.12)}
.btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--danger);color:#fff}
.btn.small{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input,textarea,select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;width:100%;font-family:inherit}
input:focus,textarea:focus{outline:1px solid var(--accent)}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge.green{background:rgba(34,197,94,.15);color:var(--accent)}
.badge.blue{background:rgba(59,130,246,.15);color:var(--info)}
.badge.amber{background:rgba(245,158,11,.15);color:var(--warn)}
.badge.red{background:rgba(239,68,68,.15);color:var(--danger)}
.badge.gray{background:var(--card2);color:var(--muted)}
.progress{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin:6px 0}
.progress>div{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease-out}
.stat{font-size:30px;font-weight:700}
.stat small{font-size:14px;color:var(--muted);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:10px;border:1px solid}
.alert.red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#FCA5A5}
.alert.amber{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#FCD34D}
.alert.green{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:#86EFAC}
.muted{color:var(--muted);font-size:13px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
/* MODAL */
#modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
#modalWrap.open{display:flex}
#modalBox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow:auto;animation:fadeIn .18s ease-out}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:13px 20px;border-radius:12px;font-size:14px;display:none;z-index:60;max-width:340px}
/* BANNER 100 */
.founderBanner{background:linear-gradient(90deg,rgba(34,197,94,.18),rgba(59,130,246,.12));border:1px solid rgba(34,197,94,.4);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;font-size:15px}
.founderBanner b{color:var(--accent);font-size:18px}
/* REGISTER */
#registerView{max-width:520px;margin:40px auto;padding:0 16px}
.ring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;margin:0 auto}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;margin-top:10px}
.bar-chart>div{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;position:relative}
.bar-chart>div span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
.appicon{width:44px;height:44px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--card2);border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

let SESSION={};try{SESSION=JSON.parse(localStorage.getItem('ptc_session')||'{}');}catch(e){}
function saveSession(){localStorage.setItem('ptc_session',JSON.stringify(SESSION));}
let LANG=SESSION.lang||'en';
let S={users:[],apps:[],matches:[]};
let deferredInstall=null;

function t(k,vars){let s=(T[LANG][k]!==undefined?T[LANG][k]:T.en[k])||k;if(vars)Object.entries(vars).forEach(([kk,v])=>{s=s.split('{'+kk+'}').join(v);});return s;}
function setLang(l){LANG=l;SESSION.lang=l;saveSession();document.documentElement.lang=l;render();}

async function api(op,payload={},silent=false){
  try{
    const r=await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({op,email:SESSION.email||'',...payload})});
    const d=await r.json();
    if(d&&d.db)S=d.db;
    return d||{ok:false,err:'empty'};
  }catch(e){if(!silent)toast(t('netErr'));return {ok:false,err:'net'};}
}

const uid=()=>Math.random().toString(36).slice(2,10);
function todayISO(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function me(){return S.users.find(u=>u.id===SESSION.meId);}
function userById(id){return S.users.find(u=>u.id===id);}
function appById(id){return S.apps.find(a=>a.id===id);}
function isMaster(){return !!me()&&SESSION.email===MASTER_ADMIN_EMAIL;}

/* ---------- 14-DAY CONTINUITY LOGIC (the heart of the app) ---------- */
function streak(m){
  if(!m.checkins.length) return 0;
  const dates=[...new Set(m.checkins.map(c=>c.date))].sort();
  let run=1;
  for(let i=dates.length-1;i>0;i--){
    if(daysDiff(dates[i-1],dates[i])===1) run++; else break;
  }
  if(daysDiff(dates[dates.length-1],todayISO())>1) return 0;
  return run;
}
function lastCheckin(m){return m.checkins.length?[...m.checkins.map(c=>c.date)].sort().pop():null;}
function checkedToday(m){return m.checkins.some(c=>c.date===todayISO());}
function dayNumber(m){return streak(m);}

/* ---------- TRUST SCORE ---------- */
function trust(u){
  const asTester=S.matches.filter(m=>m.testerId===u.id);
  let tt=50;
  tt+=asTester.filter(m=>m.status==='done').length*12;
  tt-=asTester.filter(m=>m.status==='abandoned').length*15;
  asTester.filter(m=>m.status==='active').forEach(m=>{tt+=Math.min(streak(m),14);});
  tt+=asTester.filter(m=>m.surveys&&(m.surveys.d7||m.surveys.d14)).length*4;
  return Math.max(0,Math.min(100,Math.round(tt)));
}
function points(u){
  let p=0;
  S.matches.filter(m=>m.testerId===u.id).forEach(m=>{p+=m.checkins.length*10;if(m.status==='done')p+=50;});
  return p;
}

/* ---------- ANDROID VERSION CHECK (requirement: above 11 → 12+) ---------- */
async function deviceCheck(){
  const ua=navigator.userAgent;
  const isAndroid=/Android/i.test(ua);
  let version=null;
  if(navigator.userAgentData&&navigator.userAgentData.getHighEntropyValues){
    try{
      const h=await navigator.userAgentData.getHighEntropyValues(['platform','platformVersion']);
      if(h.platform==='Android'&&h.platformVersion)version=parseInt(h.platformVersion);
    }catch(e){}
  }
  if(version===null&&isAndroid){const m2=ua.match(/Android (\d+)/);if(m2)version=parseInt(m2[1]);}
  return {isAndroid,version,record:{android:isAndroid,version:version}};
}

/* ---------- GOOGLE SIGN-IN (Google Identity Services) ---------- */
function googleClientId(){return (SESSION.googleClientId||DEFAULT_GOOGLE_CLIENT_ID||'').trim();}
function parseJwt(tok){
  const b=tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(Array.prototype.map.call(atob(b),c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}
let gisReady=false,gisClientUsed='';
function maybeInitGoogle(){
  const cid=googleClientId();
  if(!cid||!window.google||!google.accounts) return;
  if(!gisReady||gisClientUsed!==cid){
    google.accounts.id.initialize({client_id:cid,callback:onGoogleCredential});
    gisReady=true;gisClientUsed=cid;
  }
  const el=document.getElementById('gBtn');
  if(el){el.innerHTML='';google.accounts.id.renderButton(el,{theme:'filled_black',size:'large',text:'continue_with',locale:LANG==='pl'?'pl':'en',width:300});}
}
async function onGoogleCredential(resp){
  let p;
  try{p=parseJwt(resp.credential);}catch(e){toast(t('gReadErr'));return;}
  const email=(p.email||'').toLowerCase();
  if(!email||!p.email_verified){toast(t('gNoMail'));return;}
  const d=await api('register',{email,google:true,picture:p.picture||''});
  if(d.ok){ // existing account — signed in
    SESSION.meId=d.meId;SESSION.email=email;saveSession();
    toast(t('welcomeBack',{n:(me()||{}).nick||''}));
    await afterLogin();return;
  }
  if(d.err!=='nick'){toast(t('netErr'));return;}
  // new account — finish sign-up (nickname + declarations)
  const suggested=(p.given_name||p.name||email.split('@')[0]).replace(/\s+/g,'').slice(0,24);
  modal(`<h2 style="margin-top:0">${t('finishTitle')}</h2>
  <div class="row" style="margin:10px 0">${p.picture?`<img src="${esc(p.picture)}" style="width:44px;height:44px;border-radius:50%">`:''}<div><b>${esc(p.name||'')}</b><div class="muted">${esc(email)}</div></div></div>
  <label>${t('nick')}</label><input id="gNick" maxlength="24" value="${esc(suggested)}">
  <label style="display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-weight:400;color:var(--text)"><input type="checkbox" id="gDevice" style="width:auto;margin-top:3px"> <span>${t('declDevice')}</span></label>
  <label style="display:flex;align-items:flex-start;gap:8px;margin-top:10px;font-weight:400;color:var(--text)"><input type="checkbox" id="gTerms" style="width:auto;margin-top:3px"> <span>${t('declTerms')}</span></label>
  <button class="btn" style="width:100%;margin-top:18px" onclick="finishGoogleReg('${esc(email)}','${esc(p.picture||'')}')">${t('createAcc')}</button>`);
}
async function finishGoogleReg(email,picture){
  const nick=document.getElementById('gNick').value.trim();
  if(nick.length<3){toast(t('vNick'));return;}
  if(!document.getElementById('gDevice').checked||!document.getElementById('gTerms').checked){toast(t('vBoth'));return;}
  const d=await api('register',{email,nick,google:true,picture});
  if(!d.ok){toast(d.err==='nickTaken'?t('nickTaken'):t('netErr'));return;}
  SESSION.meId=d.meId;SESSION.email=email;saveSession();closeModal();
  toast((me()||{}).founder?t('welcomeFounder'):t('created'));
  await afterLogin();
}

async function doRegister(){
  const nick=document.getElementById('regNick').value.trim();
  const email=document.getElementById('regEmail').value.trim().toLowerCase();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast(t('vEmail'));return;}
  const existing=await api('register',{email});
  if(existing.ok){ // known e-mail — sign in
    SESSION.meId=existing.meId;SESSION.email=email;saveSession();
    toast(t('welcomeBack',{n:(me()||{}).nick||''}));
    await afterLogin();return;
  }
  if(nick.length<3){toast(t('vNick'));return;}
  if(!document.getElementById('regDevice').checked||!document.getElementById('regTerms').checked){toast(t('vBoth'));return;}
  const d=await api('register',{email,nick});
  if(!d.ok){toast(d.err==='nickTaken'?t('nickTaken'):t('netErr'));return;}
  SESSION.meId=d.meId;SESSION.email=email;saveSession();
  toast((me()||{}).founder?t('welcomeFounder'):t('created'));
  await afterLogin();
}
async function afterLogin(){
  if(SESSION.pendingJoin){
    const appId=SESSION.pendingJoin;
    delete SESSION.pendingJoin;saveSession();
    const a=appById(appId);
    if(a&&a.ownerId!==(me()||{}).id&&!S.matches.some(m=>m.appId===appId&&m.testerId===SESSION.meId)){
      await acceptChallenge(appId,true);return;
    }
  }
  render();
}

/* QR code rendered locally (no external service — the link never leaves the app) */
function qrBlock(text){
  if(typeof qrcode==='undefined')return '';
  try{
    const q=qrcode(0,'M');q.addData(text);q.make();
    const svg=q.createSvgTag({cellSize:4,margin:0,scalable:true}).replace('<svg ','<svg style="width:190px;height:190px;display:block" ');
    return '<div style="background:#fff;padding:14px;border-radius:14px;display:inline-block">'+svg+'</div>';
  }catch(e){return '';}
}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const max=900;let w=img.width,h=img.height;
      if(w>max||h>max){const k=Math.min(max/w,max/h);w=Math.round(w*k);h=Math.round(h*k);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.72));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

    <div style="height:20px"></div></div>
  <div class="card"><b>${t('admList',{n:count})}</b>
    <table style="margin-top:10px"><tr><th>${t('colNo')}</th><th>${t('colNick')}</th><th>${t('colEmail')}</th><th>${t('colDate')}</th><th>${t('colStatus')}</th><th>${t('colTrust')}</th></tr>
    ${S.users.map((u,i)=>`<tr><td>${i+1}</td><td>${esc(u.nick)}</td><td>${esc(u.email||'•••')}</td><td>${u.createdAt}</td><td>${u.founder?'<span class="badge green">'+t('stFounder')+'</span>':'<span class="badge amber">'+t('stPaid')+'</span>'}</td><td>${trust(u)}</td></tr>`).join('')}
    </table></div>
  <div class="alert amber">${t('admPay')}</div>`;
}

/* ============ SETTINGS ============ */
function settingsView(){
  return `<h1>${t('setTitle')}</h1><div class="sub">${t('setSub')}</div>
  <div class="card"><b>${t('langTitle')}</b><div style="height:8px"></div>${langSwitcher()}</div>
  <div class="card"><b>${t('installTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('installInfo')}</p>
  ${deferredInstall?`<button class="btn" onclick="doInstall()">${t('installBtn')}</button>`:`<div class="muted">${t('installHint')}</div>`}</div>
  <div class="card"><b>${t('dbTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('dbInfo')}</p>
  <button class="btn" onclick="exportJSON()">${t('exportBtn')}</button></div>
  <div class="card"><b>${t('gTitle')}</b>
  <p class="muted" style="margin:8px 0 14px">${t('gInfo')}</p>
  <label>OAuth Client ID</label><input id="gcid" placeholder="....apps.googleusercontent.com" value="${esc(SESSION.googleClientId||'')}">
  <button class="btn sec" style="margin-top:14px" onclick="saveClientId()">${t('gSaveBtn')}</button></div>
  <div class="card"><b>${t('dangerTitle')}</b><div style="height:10px"></div>
  <button class="btn sec" onclick="delete SESSION.meId;delete SESSION.email;saveSession();render();">${t('logout')}</button></div>
  <div class="card muted" style="font-size:13px">${t('footer')}</div>`;
}
function saveClientId(){
  const v=document.getElementById('gcid').value.trim();
  if(v&&!/\.apps\.googleusercontent\.com$/.test(v)){toast(t('gBad'));return;}
  if(v)SESSION.googleClientId=v;else delete SESSION.googleClientId;
  saveSession();
  toast(v?t('gSaved'):t('gRemoved'));
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='play-test-backup-'+todayISO()+'.json';a.click();
  toast(t('exported'));
}

/* ---------- PWA INSTALL ---------- */
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;});
async function doInstall(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  const r=await deferredInstall.userChoice;
  if(r.outcome==='accepted'){toast(t('installed'));deferredInstall=null;render();}
}

/* ---------- LIVE REFRESH (owner + admin see changes automatically) ---------- */
async function pollState(){
  if(document.getElementById('modalWrap').classList.contains('open'))return;
  const before=JSON.stringify(S);
  const d=await api('state',{},true);
  if(d.ok&&JSON.stringify(S)!==before)render();
}

/* ---------- START ---------- */
(async()=>{
  document.documentElement.lang=LANG;
  const jm=location.hash.match(/join=(\w+)/);
  if(jm){SESSION.pendingJoin=jm[1];saveSession();history.replaceState(null,'',location.pathname);}
  const el=document.getElementById('loadTxt');if(el)el.textContent=t('loading');
  const d=await api('state');
  if(d.ok&&d.meId&&SESSION.email&&!SESSION.meId){SESSION.meId=d.meId;saveSession();}
  if(SESSION.meId&&me()&&SESSION.pendingJoin){await afterLogin();}
  else render();
  setInterval(pollState,25000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)pollState();});
})();
</script>
</body>
</html>
